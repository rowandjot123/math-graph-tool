<!DOCTYPE html>
<html>
<head>
<title>KMSw Graphing Tool</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  font-family:Arial;
  margin:20px;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
}

h1{
  color:#003366;
}

.instructions{
  background:#f4f6f8;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
}

input{
  padding:8px;
  width:220px;
}

button{
  padding:7px 12px;
  margin:4px;
  cursor:pointer;
}

.chartBox{
  height:450px;
}

footer{
  margin-top:40px;
  color:gray;
  font-size:14px;
}

.category{
  margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>KMSw Graphing Tool</h1>

<div class="instructions">
<b>This tool helps you visualize mathematical graphs.</b><br>
Enter an equation using <b>x</b>, or click any sample below to begin.
</div>

<input id="equation" value="2*x">
<button onclick="drawGraph()">Draw Graph</button>

<!-- FUNCTION GROUPS -->

<div class="category">
<b>Linear</b><br>
<button onclick="setEq('2*x')">y=2x</button>
</div>

<div class="category">
<b>Quadratic / Cubic</b><br>
<button onclick="setEq('x*x')">x²</button>
<button onclick="setEq('x*x*x')">x³</button>
</div>

<div class="category">
<b>Rational</b><br>
<button onclick="setEq('1/x')">1/x</button>
</div>

<div class="category">
<b>Exponential & Logarithmic</b><br>
<button onclick="setEq('Math.exp(x)')">eˣ</button>
<button onclick="setEq('Math.log(x)')">ln(x)</button>
</div>

<div class="category">
<b>Modulus</b><br>
<button onclick="setEq('Math.abs(x)')">|x|</button>
</div>

<div class="category">
<b>Trigonometric</b><br>
<button onclick="setEq('Math.sin(x)')">sin(x)</button>
<button onclick="setEq('Math.cos(x)')">cos(x)</button>
<button onclick="setEq('Math.tan(x)')">tan(x)</button>
</div>

<br>

<div class="chartBox">
<canvas id="myChart"></canvas>
</div>

<footer>
Created by Mr. Rowand George • KMSw Graphing Tool
</footer>

</div>

<script>

let chart;

document.getElementById("equation")
.addEventListener("keypress",e=>{
 if(e.key==="Enter") drawGraph();
});

function setEq(eq){
 document.getElementById("equation").value=eq;
 drawGraph();
}

function drawGraph(){

let eq=document.getElementById("equation").value;

let xValues=[];
let yValues=[];

for(let i=0;i<=200;i++){
 let x=-10+i*0.1;

 try{
   let y=Function("x","return "+eq)(x);
   xValues.push(x);
   yValues.push(isFinite(y)?y:null);
 }
 catch{
   yValues.push(null);
 }
}

if(chart) chart.destroy();

chart=new Chart(
document.getElementById("myChart"),
{
type:"line",

data:{
labels:xValues,
datasets:[{
label:"y = "+eq,
data:yValues,
borderWidth:2,
pointRadius:0
}]
},

options:{
responsive:true,
maintainAspectRatio:false,

interaction:{mode:'index',intersect:false},

scales:{
x:{
title:{display:true,text:"x"},
ticks:{
callback:v=>Number(v).toFixed(1)
}
},
y:{
title:{display:true,text:"y"},
ticks:{
callback:v=>Number(v).toFixed(2)
}
}
}
}
});
}

drawGraph();

</script>

</body>
</html>
